<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Hospitalar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">🏥</div>
        <h1>SISTEMA DE MONITORAMENTO HOSPITALAR</h1>
        <div class="user">Olá, Usuário 👤</div>
    </header>

    <nav>
        <button>Home</button>
        <button>Cadastro</button>
        <button>Dashboard</button>
        <button>Chat</button>
    </nav>

    <main>

        <div class="card">
            <h2>📦 Estoque Atualizado</h2>
            <p>Total de itens</p>
            <h1 class="total-itens">120</h1>
            <p>Em falta</p>
            <h2 class="alert">8</h2>
        </div>

        <div class="card">
            <h2>⚠️ Materiais em Falta</h2>
            <ul class="faltas">
                <li>Luvas</li>
                <li>Seringas</li>
                <li>Máscaras</li>
            </ul>
        </div>

        <div class="card">
            <h2>📊 Gráfico de Estoque</h2>
            <div class="grafico">
                <div style="height:90%"></div>
                <div style="height:50%"></div>
                <div style="height:25%"></div>
                <div style="height:10%"></div>
            </div>
            <div class="labels">
                <span>Luvas</span>
                <span>Seringas</span>
                <span>Máscaras</span>
                <span>Álcool</span>
            </div>
        </div>

    </main>

    <section class="chat">
        <h2>💬 Chatbot Assistente</h2>
        <div class="chat-container">
            <input type="text" id="chat-input" placeholder="Digite sua pergunta (ex: luvas)...">
            <button id="chat-btn">Enviar</button>
        </div>
    </section>

    <script>
        document.getElementById("chat-btn").onclick = function() {
            let input = document.getElementById("chat-input").value.toLowerCase();

            if (input.includes("luvas") || input.includes("luva")) {
                alert("🤖 Chatbot: Temos 50 caixas de luvas disponíveis no estoque principal.");
            } else if (input.includes("seringas") || input.includes("seringa")) {
                alert("🤖 Chatbot: Atenção! O estoque de seringas está crítico (apenas 5 unidades).");
            } else if (input.trim() === "") {
                alert("🤖 Chatbot: Por favor, digite alguma pergunta.");
            } else {
                alert("🤖 Chatbot: Desculpe, ainda não sei responder sobre isso. Tente perguntar por 'luvas' ou 'seringas'.");
            }
            
            // Limpa o campo após o envio
            document.getElementById("chat-input").value = "";
        }
    </script>

</body>
</html>
